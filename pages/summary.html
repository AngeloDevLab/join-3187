<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
      <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/summary.css" />
    <link rel="stylesheet" href="../css/global.css" />
      <link rel="stylesheet" href="../css/sidebar.css" />
</head>
<body>
  <nav class="sidebar">
    <img src="../assets/icons/join_logo.svg" alt="Join Logo" class="logo">
  <ul>
    <li><a href="../pages/summary.html"><img src="../assets/icons/summary.svg" alt="Summary Icon" class="nav-icon">Summary</a></li>
    <li><a href="../pages/board.html"><img src="../assets/icons/edit_square.svg" alt="Add TaskIcon" class="nav-icon">Add Task</a></li>
    <li><a href="../pages/calendar.html"><img src="../assets/icons/board.svg" alt="Calendar Icon" class="nav-icon">Board</a></li>
    <li><a href="../pages/settings.html"><img src="../assets/icons/contact.svg" alt="Settings Icon" class="nav-icon">Contacts</a></li>
  </ul>
  </nav>
    <main>
      <div class="title">
       <h2>Join 360</h2>
       <p class="subline">Key Metrics at a Glance</p>
       </div>
<div class="desktop-container">
       <section class="summary-board">
          <div class="summary-card summary-card_flex">
            <img src="../assets/icons/edit.svg" class="edit-icon" alt="Edit Icon">
            <div>
           <p class="card-number">1</p>
           <p>To-do</p>
           </div>
          </div>
          <div class="summary-card summary-card_flex">
              <img src="../assets/icons/check.svg" class="edit-icon" alt="Done Icon">
              <div>
          <p class="card-number">2</p>
           <p>Done</p>
           </div>
          </div>
          <div class="summary-card summary-card_flex">
               <img src="../assets/icons/urgent.svg" class="urgent-icon" alt="Urgent Icon">
               <div class="border-date">
           <p class="card-number">1</p>
           <p>Urgent</p>
           </div>
           <p><strong>October 16, 2022</strong><br> Upcoming Deadline</p>
          </div>
          <div class="summary-card">
            <p class="card-number">5</p>
       <p>Tasks in Board</p>
       </div>
          <div class="summary-card">
            <p class="card-number">2</p>
       <p>Tasks In Progress </p>
       </div>
          <div class="summary-card">
  
            <p class="card-number">2</p>
       <p>Awaiting feedback </p>
     
       </div>
       </section>
       <div class="greeting-overlay">
  <p>Good Morning!</p>
</div>
</div>
      </main>

</body>
<script src="../js/pages/summary.js"></script>
</html>
